#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[permissions.autonomy_default.filesystem.":project_roots"]
".\\" = "write"

[permissions.autonomy_default.network]
enabled = true
mode = "limited"

default_permissions = "autonomy_default"

[windows]
sandbox = "unelevated"
